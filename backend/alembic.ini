[alembic]
script_location = alembic

# Uses SYNC URL (psycopg2). asyncpg cannot run Alembic DDL migrations directly.
# DATABASE_SYNC_URL is set in docker-compose.yml and overrides this default.
sqlalchemy.url = postgresql+psycopg2://campusbook:secret123@localhost:5432/campusbook

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S