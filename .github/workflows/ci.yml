name: CI Pipeline

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  lint-and-typecheck:
    name: Lint & TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
          
      - name: Lint with flake8
        run: |
          # Only check for syntax errors or undefined names to prevent CI blocking on style too early
          flake8 backend/app --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: TypeScript check
        run: cd frontend && npx tsc --noEmit || echo "TypeScript check completed with warnings"

  code-format:
    name: Code Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Check code formatting
        run: |
          echo "## Code Format Check Results" >> $GITHUB_STEP_SUMMARY
          cd frontend && npm run format:check 2>&1 | tee -a $GITHUB_STEP_SUMMARY || true
        continue-on-error: true

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Run frontend tests
        run: cd frontend && npm run test -- src/test/

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Docker Build Check
        run: |
          # Build test: ensures Dockerfile and environment are perfectly buildable
          docker compose build api

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_DB: campusbook
          POSTGRES_USER: campusbook
          POSTGRES_PASSWORD: secret123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          
      - name: Install testing dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
          pip install pytest pytest-asyncio pytest-cov httpx
          
      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://campusbook:secret123@localhost:5432/campusbook
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: testing-secret
        run: |
          cd backend
          if [ -d "tests/" ]; then
            PYTHONPATH=. pytest --cov=app --cov-report=xml tests/
          else
            echo "No tests folder found. Skipping pytest execution."
          fi
          
      - name: Pytest coverage PR comment
        if: github.event_name == 'pull_request_target'
        uses: MishaKav/pytest-coverage-comment@main
        continue-on-error: true
        with:
          pytest-xml-coverage-path: ./backend/coverage.xml
