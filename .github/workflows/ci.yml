name: CI Pipeline

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
          
      - name: Lint with flake8
        run: |
          # Only check for syntax errors or undefined names to prevent CI blocking on style too early
          flake8 backend/app --count --select=E9,F63,F7,F82 --show-source --statistics
          
      - name: Docker Build Check
        run: |
          # Build test: ensures Dockerfile and environment are perfectly buildable
          docker compose build api

  test:
    needs: lint-and-build
    runs-on: ubuntu-latest
    
    # Spin up backing services directly in the runner
    services:
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_DB: campusbook
          POSTGRES_USER: campusbook
          POSTGRES_PASSWORD: secret123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          
      - name: Install testing dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
          pip install pytest pytest-asyncio pytest-cov httpx
          
      - name: Test by folder structure with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://campusbook:secret123@localhost:5432/campusbook
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: testing-secret
        run: |
          cd backend
          if [ -d "tests/" ]; then
            PYTHONPATH=. pytest --cov=app --cov-report=xml tests/
          else
            echo "No tests folder found. Skipping pytest execution."
          fi
          
      - name: Pytest coverage PR comment
        if: github.event_name == 'pull_request'
        uses: MishaKav/pytest-coverage-comment@main
        continue-on-error: true
        with:
          pytest-xml-coverage-path: ./backend/coverage.xml
